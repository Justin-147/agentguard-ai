controls:
  human_approval_gate:
    description: "Require human approval before high-impact external actions."
    mitigates:
      - external_action_risk
      - human_oversight_gap

  tool_allowlist:
    description: "Restrict available tools to approved low-risk actions."
    mitigates:
      - tool_permission_risk
      - cybersecurity_risk

  tool_call_audit_log:
    description: "Record all tool calls with timestamp, input, output, and outcome."
    mitigates:
      - auditability_gap
      - operational_risk

  pii_redaction:
    description: "Redact or mask personal data before model processing."
    mitigates:
      - data_privacy_risk

  retention_policy:
    description: "Define and enforce data retention and deletion policy."
    mitigates:
      - data_privacy_risk
      - auditability_gap

  prompt_injection_tests:
    description: "Test agent behavior against direct and indirect prompt injection."
    mitigates:
      - prompt_injection_risk
      - cybersecurity_risk

  evaluation_suite:
    description: "Run task-specific quality, hallucination, and regression tests."
    mitigates:
      - model_risk

  fallback_procedure:
    description: "Define fallback behavior when the agent is uncertain or tools fail."
    mitigates:
      - operational_risk
      - model_risk

  incident_response_plan:
    description: "Define response process for agent failure, data leakage, or harmful action."
    mitigates:
      - operational_risk
      - cybersecurity_risk

  secrets_management:
    description: "Store API keys and credentials using safe secrets management."
    mitigates:
      - cybersecurity_risk

  rate_limits:
    description: "Limit frequency and volume of agent actions."
    mitigates:
      - operational_risk
      - external_action_risk

  source_attribution:
    description: "Require sources for factual claims."
    mitigates:
      - model_risk
      - auditability_gap

  regulated_records_control:
    description: "Define controls for records that may be subject to regulated business processes."
    mitigates:
      - regulatory_risk
      - data_privacy_risk

  vendor_due_diligence:
    description: "Review external providers for reliability, data handling, security posture, and operational dependency."
    mitigates:
      - third_party_risk
      - cybersecurity_risk

  third_party_contract_review:
    description: "Document third-party responsibilities, data boundaries, incident handling, and service expectations."
    mitigates:
      - third_party_risk
      - regulatory_risk

  model_card:
    description: "Maintain a model or system card describing intended use, limitations, evaluation results, and known risks."
    mitigates:
      - model_risk
      - auditability_gap

  data_lineage:
    description: "Track data sources, transformations, outputs, and retention paths used by the agent workflow."
    mitigates:
      - data_privacy_risk
      - regulatory_risk
      - auditability_gap

  embedding_store_access_control:
    description: "Restrict and monitor access to vector stores or long-term memory containing sensitive content."
    mitigates:
      - data_privacy_risk
      - cybersecurity_risk

  output_sanitization:
    description: "Sanitize generated outputs before display, storage, or external transmission."
    mitigates:
      - prompt_injection_risk
      - data_privacy_risk
      - cybersecurity_risk

  content_safety_filter:
    description: "Filter unsafe, malicious, or policy-violating inputs and outputs before tool execution."
    mitigates:
      - cybersecurity_risk
      - prompt_injection_risk
      - operational_risk

  system_prompt_protection:
    description: "Protect system instructions and tool policies from disclosure or untrusted override."
    mitigates:
      - prompt_injection_risk
      - cybersecurity_risk

  budget_and_rate_guardrail:
    description: "Set budget, volume, and rate guardrails for automated actions and external API usage."
    mitigates:
      - operational_risk
      - external_action_risk
      - third_party_risk

  human_escalation_path:
    description: "Define named escalation routes for uncertain, high-impact, or failed agent actions."
    mitigates:
      - human_oversight_gap
      - operational_risk

  red_team_program:
    description: "Run structured red-team exercises against prompt injection, tool misuse, data leakage, and unsafe outputs."
    mitigates:
      - model_risk
      - prompt_injection_risk
      - cybersecurity_risk

  privacy_impact_assessment:
    description: "Assess privacy impact for personal, financial, confidential, or regulated data in the workflow."
    mitigates:
      - data_privacy_risk
      - regulatory_risk
