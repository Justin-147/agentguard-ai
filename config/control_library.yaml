controls:
  human_approval_gate:
    description: "Require human approval before high-impact external actions."
    mitigates:
      - external_action_risk
      - human_oversight_gap

  tool_allowlist:
    description: "Restrict available tools to approved low-risk actions."
    mitigates:
      - tool_permission_risk
      - cybersecurity_risk

  tool_call_audit_log:
    description: "Record all tool calls with timestamp, input, output, and outcome."
    mitigates:
      - auditability_gap
      - operational_risk

  pii_redaction:
    description: "Redact or mask personal data before model processing."
    mitigates:
      - data_privacy_risk

  retention_policy:
    description: "Define and enforce data retention and deletion policy."
    mitigates:
      - data_privacy_risk
      - auditability_gap

  prompt_injection_tests:
    description: "Test agent behavior against direct and indirect prompt injection."
    mitigates:
      - prompt_injection_risk
      - cybersecurity_risk

  evaluation_suite:
    description: "Run task-specific quality, hallucination, and regression tests."
    mitigates:
      - model_risk

  fallback_procedure:
    description: "Define fallback behavior when the agent is uncertain or tools fail."
    mitigates:
      - operational_risk
      - model_risk

  incident_response_plan:
    description: "Define response process for agent failure, data leakage, or harmful action."
    mitigates:
      - operational_risk
      - cybersecurity_risk

  secrets_management:
    description: "Store API keys and credentials using safe secrets management."
    mitigates:
      - cybersecurity_risk

  rate_limits:
    description: "Limit frequency and volume of agent actions."
    mitigates:
      - operational_risk
      - external_action_risk

  source_attribution:
    description: "Require sources for factual claims."
    mitigates:
      - model_risk
      - auditability_gap
