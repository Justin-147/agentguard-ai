rules:
  AG-RULE-ACTION-001:
    risk_tag: external_action_risk
    title: External action lacks approval
    description: "The agent can take an outward-facing or business-impacting action without a human approval gate."
    framework_refs: ["OWASP-LLM06-2025", "NIST-AI-RMF-MANAGE"]
    base_controls: ["human_approval_gate", "rate_limits"]

  AG-RULE-HUMAN-001:
    risk_tag: human_oversight_gap
    title: Approval gap for external action
    description: "Medium or high impact agent actions should have explicit review, escalation, or approval before execution."
    framework_refs: ["NIST-AI-RMF-GOVERN"]
    base_controls: ["human_approval_gate", "human_escalation_path"]

  AG-RULE-DATA-001:
    risk_tag: data_privacy_risk
    title: Sensitive data controls are incomplete
    description: "Sensitive data processing lacks one or more basic privacy controls."
    framework_refs: ["OWASP-LLM02-2025", "NIST-AI-RMF-MAP"]
    base_controls: ["pii_redaction", "retention_policy", "privacy_impact_assessment"]

  AG-RULE-REG-001:
    risk_tag: regulatory_risk
    title: Regulated or financial data exposure
    description: "Financial or regulated data increases the need for controlled records, monitoring, and review."
    framework_refs: ["NIST-AI-RMF-GOVERN", "NIST-AI-RMF-MAP"]
    base_controls: ["regulated_records_control", "data_lineage"]

  AG-RULE-CYBER-001:
    risk_tag: cybersecurity_risk
    title: Security control gap
    description: "The workflow exposes secrets, privileged tools, or sensitive data without enough security controls."
    framework_refs: ["OWASP-LLM02-2025", "NIST-AI-RMF-MANAGE"]
    base_controls: ["secrets_management", "tool_allowlist"]

  AG-RULE-TOOL-001:
    risk_tag: tool_permission_risk
    title: Tool permission is not approval-gated
    description: "The workflow gives the agent broad or potentially dangerous tool permissions without approval."
    framework_refs: ["OWASP-LLM06-2025", "NIST-AI-RMF-MANAGE"]
    base_controls: ["tool_allowlist", "human_approval_gate"]

  AG-RULE-AUDIT-001:
    risk_tag: auditability_gap
    title: Audit trail is incomplete
    description: "The workflow may be difficult to investigate, replay, or evidence during governance review."
    framework_refs: ["NIST-AI-RMF-GOVERN"]
    base_controls: ["tool_call_audit_log", "retention_policy"]

  AG-RULE-MODEL-001:
    risk_tag: model_risk
    title: Model evaluation coverage is incomplete
    description: "The workflow has missing model quality, red-team, hallucination, monitoring, or fallback checks."
    framework_refs: ["NIST-AI-RMF-MEASURE"]
    base_controls: ["evaluation_suite", "model_card", "red_team_program"]

  AG-RULE-OPS-001:
    risk_tag: operational_risk
    title: Operational resilience controls are incomplete
    description: "Missing fallback, monitoring, reversibility, rate-limit, rollback, or incident controls can delay recovery."
    framework_refs: ["NIST-AI-RMF-MANAGE"]
    base_controls: ["fallback_procedure", "incident_response_plan", "budget_and_rate_guardrail"]

  AG-RULE-PROMPT-001:
    risk_tag: prompt_injection_risk
    title: Untrusted content lacks prompt-injection testing
    description: "Agents that read emails, web content, uploaded documents, customer messages, or external APIs need prompt-injection controls."
    framework_refs: ["OWASP-LLM01-2025", "NIST-AI-RMF-MEASURE"]
    base_controls: ["prompt_injection_tests", "system_prompt_protection", "output_sanitization"]

  AG-RULE-THIRD-001:
    risk_tag: third_party_risk
    title: External API dependency is present
    description: "External providers and APIs introduce availability, data handling, and vendor-control considerations."
    framework_refs: ["NIST-AI-RMF-MAP"]
    base_controls: ["vendor_due_diligence", "third_party_contract_review"]

  AG-RULE-MEMORY-001:
    risk_tag: data_privacy_risk
    title: Sensitive memory controls are incomplete
    description: "Long-lived or vector memory that contains sensitive data should support access controls, expiration, and deletion."
    framework_refs: ["OWASP-LLM02-2025", "NIST-AI-RMF-MAP"]
    base_controls: ["embedding_store_access_control", "retention_policy"]
