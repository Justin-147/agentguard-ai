name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Compile
        run: python -m compileall src tests scripts

      - name: Mypy
        run: mypy src/agentguard

      - name: Pytest
        run: pytest

      - name: Validate config
        run: python -m agentguard.main validate

      - name: Validate workflow
        run: python -m agentguard.main validate-workflow --input examples/workflows/high_risk_autonomous_agent.json

      - name: CLI smoke test
        run: python -m agentguard.main assess --case financial_advisor_copilot --as-of 2026-07-06 --output-root .tmp/ci-output

      - name: Assess all demo cases
        run: python -m agentguard.main assess-all --as-of 2026-07-06 --output-root .tmp/ci-output

      - name: Build package
        run: python -m build
